<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>OceanAR — Immersive Experience</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --deep: #020c18;
      --teal: #1ab3c8;
      --foam: #a8f0f5;
      --glow: #00ffe7;
      --text: #d8f4f7;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family:'Space Mono',monospace; background:var(--deep); color:var(--text); overflow:hidden; height: 100vh; }

    /* ── SPLASH SCREEN (iOS FIX) ── */
    #splash {
      position:fixed; inset:0; z-index:1000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:radial-gradient(ellipse at 50% 70%, #0a3a5a 0%, #020c18 70%);
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    #splash.hidden { opacity:0; visibility: hidden; pointer-events:none; }

    .bubbles { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index: 1; }
    .bubble {
      position:absolute; bottom:-40px; border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(26,179,200,0.08));
      border:1px solid rgba(26,179,200,0.25);
      animation:rise linear infinite;
    }
    @keyframes rise { to { transform:translateY(-110vh); opacity:0; } }

    .title {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3rem, 10vw, 6rem); font-weight:300; line-height:0.95;
      color:var(--foam); text-shadow:0 0 40px rgba(0,255,231,0.25);
    }
    .title em { font-style:italic; color:var(--glow); }

    #startBtn {
      background:transparent; border:1.5px solid var(--glow); color:var(--glow);
      padding:1.2rem 2.5rem; cursor:pointer; text-transform:uppercase; 
      letter-spacing:0.2em; font-size: 0.8rem; margin-top: 3rem; z-index: 1001;
    }

    /* ── MODEL VIEWER ── */
    model-viewer {
      width: 100%; height: 100%;
      background-color: var(--deep);
    }

    /* ── HUD ── */
    .hud-top {
      position:absolute; top:0; left:0; right:0; padding:1.5rem;
      display:flex; justify-content:space-between; align-items:center;
      z-index: 100; pointer-events: none;
    }
    .hud-logo { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--foam); }

    #ar-button {
      position: absolute; bottom: 3rem; left: 50%; transform: translateX(-50%);
      background: #fff; color: #000; border: none;
      padding: 1rem 2rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; border-radius: 4px; cursor: pointer;
    }

    /* ── LOADING ── */
    #loading {
      position:fixed; inset:0; z-index:1100; background:var(--deep);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:opacity 0.5s;
    }
    #loading.hidden { opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<div id="loading">
  <div style="font-size:2rem; animation: pulse 2s infinite;">🐠</div>
  <p style="letter-spacing:0.4em; font-size:0.6rem; color:var(--teal); margin-top:1rem;">LOADING OCEAN</p>
</div>

<div id="splash">
  <div class="bubbles" id="bubblesEl"></div>
  <div style="text-align:center; z-index:2;">
    <p style="font-size:0.6rem; letter-spacing:0.4em; color:var(--teal); text-transform:uppercase;">CPIS360 EXPERIMENT</p>
    <h1 class="title">Ocean<em>AR</em></h1>
    <button id="startBtn">Begin Experience</button>
  </div>
</div>

<div class="hud-top">
    <div class="hud-logo">Ocean<span>AR</span></div>
</div>

<model-viewer 
  id="oceanView"
  src="models/school_of_fish.glb" 
  ios-src="models/school_of_fish.usdz"
  ar ar-modes="webxr scene-viewer quick-look" 
  camera-controls auto-rotate shadow-intensity="1">
  <button slot="ar-button" id="ar-button">VIEW IN YOUR ROOM</button>
</model-viewer>

<script>
  const splash = document.getElementById('splash');
  const startBtn = document.getElementById('startBtn');

  // iOS TOUCH FIX
  const begin = (e) => {
    e.preventDefault();
    splash.classList.add('hidden');
    // Remove from DOM to prevent blocking the camera view
    setTimeout(() => { splash.style.display = 'none'; }, 600);
  };

  startBtn.addEventListener('click', begin);
  startBtn.addEventListener('touchstart', begin, {passive: false});

  window.onload = () => {
    makeBubbles();
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1000);
  };

  function makeBubbles() {
    const el = document.getElementById('bubblesEl');
    for (let i = 0; i < 20; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const s = Math.random()*20+8;
      b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*8+4}s;animation-delay:${Math.random()*5}s;`;
      el.appendChild(b);
    }
  }
</script>
</body>
</html>
