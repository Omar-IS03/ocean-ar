<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>OceanAR — Immersive Deep Sea</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --deep: #020c18;
      --teal: #1ab3c8;
      --foam: #a8f0f5;
      --glow: #00ffe7;
      --text: #d8f4f7;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family:'Space Mono',monospace; background:var(--deep); color:var(--text); overflow:hidden; height: 100vh; width: 100vw; }

    /* ── 1. LOADING SCREEN ── */
    #loading {
      position:fixed; inset:0; z-index:9999; background:var(--deep);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem;
      transition: opacity 0.4s ease;
    }
    .hidden-load { opacity:0 !important; pointer-events:none !important; }
    .fish-anim { font-size:2.5rem; animation:swim 1s ease infinite alternate; }
    @keyframes swim { from{transform:translateX(-18px)} to{transform:translateX(18px)} }
    .load-label { font-size:0.58rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--teal); }
    .load-track { width:140px; height:1px; background:rgba(26,179,200,0.2); position:relative; overflow:hidden; }
    .load-track::after { content:''; position:absolute; inset:0; background:var(--glow); animation:fill 1.5s ease infinite; }
    @keyframes fill { 0%{transform:scaleX(0);transform-origin:left} 50%{transform:scaleX(1);transform-origin:left} 51%{transform:scaleX(1);transform-origin:right} 100%{transform:scaleX(0);transform-origin:right} }

    /* ── 2. SPLASH SCREEN ── */
    #splash {
      position:fixed; inset:0; z-index:1000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:radial-gradient(ellipse at 50% 70%, #0a3a5a 0%, #020c18 70%);
      transition: opacity 0.5s ease;
    }
    .splash-hide { opacity:0 !important; visibility: hidden !important; pointer-events:none !important; }
    .bubbles { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index: 1; }
    .bubble {
      position:absolute; bottom:-40px; border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(26,179,200,0.08));
      border:1px solid rgba(26,179,200,0.25);
      animation:rise linear infinite;
    }
    @keyframes rise { to { transform:translateY(-110vh); opacity:0; } }

    .splash-content { position:relative; z-index:1001; text-align:center; padding: 2rem; max-width: 420px; }
    .title { font-family:'Cormorant Garamond',serif; font-size:clamp(3.2rem, 11vw, 6rem); font-weight:300; line-height:0.95; color:var(--foam); text-shadow:0 0 50px rgba(0,255,231,0.25); margin-bottom: 1.8rem;}
    #startBtn { border:1.5px solid var(--glow); color:var(--glow); background:transparent; padding:1rem 2.5rem; cursor:pointer; text-transform:uppercase; font-size:0.75rem; letter-spacing:0.2em; }

    /* ── 3. HUD & UI ── */
    .hud-top { position:absolute; top:0; left:0; right:0; padding:1.5rem; display:flex; justify-content:space-between; align-items:center; z-index: 100; pointer-events: none; }
    .hud-logo { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--foam); }
    #creatureSelector { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; gap:0.8rem; z-index:150; }
    .creature-btn { background:rgba(2,12,24,0.85); border:1px solid rgba(26,179,200,0.3); color:var(--foam); padding:0.6rem 1rem; border-radius: 4px; font-size:0.55rem; text-transform:uppercase; cursor:pointer; }
    .creature-btn.active { border-color:var(--glow); color:var(--glow); box-shadow:0 0 15px rgba(0,255,231,0.2); }

    /* ── 4. IMAGE OVERLAY (THE GLASS TABLET) ── */
    #imageOverlay {
      position:fixed; inset:0; z-index:2000;
      background:rgba(2,12,24,0.95);
      display:none; flex-direction:column; align-items:center; justify-content:center;
      padding:20px; backdrop-filter: blur(15px);
    }
    #imageOverlay img { max-width: 90%; max-height: 80%; border: 1px solid var(--teal); }
    .close-hint { margin-top: 25px; font-size: 0.6rem; color: var(--teal); letter-spacing: 0.25em; text-transform: uppercase; }

    #ar-button {
      position: absolute; bottom: 8rem; left: 50%; transform: translateX(-50%);
      background: var(--glow); color: var(--deep); border: none; padding: 1rem 2rem; font-weight: 700; border-radius: 4px; cursor: pointer;
    }

    model-viewer { width: 100%; height: 100%; background-color: var(--deep); }
  </style>
</head>
<body>

<audio id="sharkGrowl" loop preload="auto">
  <source src="Audio/SharkSound.mp3" type="audio/mpeg">
</audio>

<div id="loading">
  <div class="fish-anim">🐠</div>
  <div class="load-label">Establishing Neural Link...</div>
  <div class="load-track"></div>
</div>

<div id="splash">
  <div class="bubbles" id="bubblesEl"></div>
  <div class="splash-content">
    <h1 class="title">Ocean<em>AR</em></h1>
    <button id="startBtn">Begin Experience</button>
  </div>
</div>

<div id="imageOverlay" onclick="hideInfo()">
    <img id="infoImg" src="" alt="Creature Information">
    <p class="close-hint">Tap anywhere to close</p>
</div>

<div class="hud-top">
    <div class="hud-logo">Ocean<span>AR</span></div>
</div>

<model-viewer 
  id="oceanView"
  src="Models/school_of_fish.glb"
  ios-src="Models/school_of_fish.usdz"
  ar 
  ar-modes="quick-look webxr scene-viewer" 
  ar-placement="floor" 
  camera-controls 
  autoplay
  shadow-intensity="1">
  <button slot="ar-button" id="ar-button">ENTER AR WORLD</button>
  <div id="creatureSelector">
    <button id="btn-fish" class="creature-btn active" onclick="switchCreature('fish')"><span>🐠</span>Fish</button>
    <button id="btn-shark" class="creature-btn" onclick="switchCreature('shark')"><span>🦈</span>Shark</button>
  </div>
</model-viewer>

<script>
// هذا الجزء تم تعديله ليتطابق مع الرابط الشغال تماماً (سمول)
const DATA = {
    fish: { 
        name: 'School of Fish', 
        infoImg: 'UI/FishInfo.png',
        glb: 'Models/school_of_fish.glb', 
        ios: 'Models/school_of_fish.usdz' 
    },
    shark: { 
        name: 'Swimming Shark', 
        infoImg: 'UI/SharkInfo.png',
        glb: 'Models/shark_animated.glb', 
        ios: 'Animation/shark_animated.reality' 
    }
};

let currentCreature = 'fish';
let tapStartX, tapStartY;
const viewer = document.getElementById('oceanView');
const audio = document.getElementById('sharkGrowl');

// 1. الفقاعات والتحميل
function makeBubbles() {
    const el = document.getElementById('bubblesEl');
    for (let i = 0; i < 15; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const s = Math.random()*20+8;
        b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*8+4}s;animation-delay:${Math.random()*5}s;`;
        el.appendChild(b);
    }
}

window.addEventListener('load', () => {
    makeBubbles();
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden-load');
        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 400);
    }, 1200);
});

document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('splash').classList.add('splash-hide');
});

// 2. التبديل الذكي (بدون صوت في المتصفح)
function switchCreature(id) {
    currentCreature = id;
    viewer.src = DATA[id].glb;
    viewer.setAttribute('ios-src', DATA[id].ios);
    
    // إيقاف الصوت خارج الـ AR
    audio.pause();
    audio.currentTime = 0;
    
    document.querySelectorAll('.creature-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + id).classList.add('active');
}

// 3. تفعيل الصوت فقط داخل الـ AR
viewer.addEventListener('ar-status', (event) => {
    if (event.detail.status === 'session-started') {
        if (currentCreature === 'shark') {
            audio.play().catch(e => console.log("Audio waiting for session"));
        }
    } else if (event.detail.status === 'not-presenting') {
        audio.pause();
        audio.currentTime = 0;
    }
});

// 4. التفاعل مع اللوحة الزجاجية
viewer.addEventListener('pointerdown', (e) => {
    tapStartX = e.clientX;
    tapStartY = e.clientY;
});
viewer.addEventListener('pointerup', (e) => {
    if (e.target.closest('.creature-btn') || e.target.closest('#ar-button')) return;
    const moveX = Math.abs(e.clientX - tapStartX);
    const moveY = Math.abs(e.clientY - tapStartY);
    if (moveX < 10 && moveY < 10) showInfo();
});
function showInfo() {
    if (document.getElementById('splash').style.display === 'none') {
        document.getElementById('infoImg').src = DATA[currentCreature].infoImg;
        document.getElementById('imageOverlay').style.display = 'flex';
    }
}
function hideInfo() { document.getElementById('imageOverlay').style.display = 'none'; }
</script>
</body>
</html>
