<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>OceanAR — Immersive Deep Sea</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --deep: #020c18;
      --teal: #1ab3c8;
      --foam: #a8f0f5;
      --glow: #00ffe7;
      --text: #d8f4f7;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family:'Space Mono',monospace; background:var(--deep); color:var(--text); overflow:hidden; height: 100vh; width: 100vw; }

    /* ── 1. LOADING SCREEN (Hardened Fix) ── */
    #loading {
      position:fixed; inset:0; z-index:9999; background:var(--deep);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem;
      transition: opacity 0.5s ease;
    }
    .hidden-load { opacity:0 !important; pointer-events:none !important; }

    .fish-anim { font-size:2.5rem; animation:swim 1s ease infinite alternate; }
    @keyframes swim { from{transform:translateX(-18px)} to{transform:translateX(18px)} }
    .load-label { font-size:0.58rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--teal); }
    .load-track { width:140px; height:1px; background:rgba(26,179,200,0.2); position:relative; overflow:hidden; }
    .load-track::after { content:''; position:absolute; inset:0; background:var(--glow); animation:fill 1.5s ease infinite; }
    @keyframes fill { 0%{transform:scaleX(0);transform-origin:left} 50%{transform:scaleX(1);transform-origin:left} 51%{transform:scaleX(1);transform-origin:right} 100%{transform:scaleX(0);transform-origin:right} }

    /* ── 2. SPLASH SCREEN ── */
    #splash {
      position:fixed; inset:0; z-index:1000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:radial-gradient(ellipse at 50% 70%, #0a3a5a 0%, #020c18 70%);
      transition: opacity 0.6s ease;
    }
    .splash-hide { opacity:0 !important; visibility: hidden !important; pointer-events:none !important; }

    .bubbles { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index: 1; }
    .bubble {
      position:absolute; bottom:-40px; border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(26,179,200,0.08));
      border:1px solid rgba(26,179,200,0.25);
      animation:rise linear infinite;
    }
    @keyframes rise { to { transform:translateY(-110vh); opacity:0; } }

    .splash-content { position:relative; z-index:1001; text-align:center; padding: 2rem; max-width: 420px; }
    .title { font-family:'Cormorant Garamond',serif; font-size:clamp(3.2rem, 11vw, 6rem); font-weight:300; line-height:0.95; color:var(--foam); text-shadow:0 0 50px rgba(0,255,231,0.25); margin-bottom: 1.8rem;}
    .title em { font-style:italic; color:var(--glow); }
    
    #startBtn {
      position:relative; background:transparent; border:1.5px solid var(--glow); color:var(--glow);
      font-family:'Space Mono',monospace; font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase;
      padding:1rem 2.5rem; cursor:pointer; transition: 0.3s;
    }
    #startBtn:active { background: var(--glow); color: var(--deep); }

    /* ── 3. HUD ── */
    .hud-top { position:absolute; top:0; left:0; right:0; padding:1.5rem; display:flex; justify-content:space-between; align-items:center; z-index: 100; pointer-events: none; }
    .hud-logo { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--foam); }
    .hud-logo span { color:var(--glow); font-style:italic; }

    /* ── 4. SELECTOR ── */
    #creatureSelector {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
      display:flex; gap:0.8rem; z-index:150;
    }
    .creature-btn {
      background:rgba(2,12,24,0.85); border:1px solid rgba(26,179,200,0.3); color:var(--foam);
      font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:0.1rem; text-transform:uppercase;
      padding:0.6rem 1rem; cursor:pointer; backdrop-filter:blur(10px); display:flex; flex-direction:column; align-items:center; gap:0.3rem;
    }
    .creature-btn.active { border-color:var(--glow); color:var(--glow); box-shadow:0 0 15px rgba(0,255,231,0.2); }
    .creature-btn span { font-size:1.4rem; }

    /* ── 5. AR BUTTON ── */
    #ar-button {
      position: absolute; bottom: 8rem; left: 50%; transform: translateX(-50%);
      background: var(--glow); color: var(--deep); border: none;
      padding: 1rem 2rem; font-family:'Space Mono',monospace; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; border-radius: 2px; cursor: pointer; white-space: nowrap;
    }

    /* ── 6. INFO CARD ── */
    #infoCard {
      position:fixed; bottom:-100%; left:50%; transform:translateX(-50%);
      width:min(420px,93vw); z-index:500; transition:bottom 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #infoCard.visible { bottom: 1.5rem; }
    .card-wrap {
      background: linear-gradient(135deg,rgba(10,37,64,0.97),rgba(2,12,24,0.97));
      border: 1px solid rgba(26,179,200,0.25); padding: 1.5rem; backdrop-filter: blur(20px);
    }
    .card-name { font-family:'Cormorant Garamond',serif; font-size:1.9rem; color:var(--foam); }
    .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.7rem; margin: 1rem 0; }
    .stat label { display:block; font-size:0.45rem; color:var(--teal); text-transform:uppercase; }
    .stat value { font-size:0.65rem; color:var(--foam); }

    model-viewer { width: 100%; height: 100%; background-color: var(--deep); }
  </style>
</head>
<body>

<div id="loading">
  <div class="fish-anim">🐠</div>
  <div class="load-label">Diving Deep...</div>
  <div class="load-track"></div>
</div>

<div id="splash">
  <div class="bubbles" id="bubblesEl"></div>
  <div class="splash-content">
    <h1 class="title">Ocean<em>AR</em></h1>
    <button id="startBtn">Begin Experience</button>
  </div>
</div>

<div class="hud-top">
    <div class="hud-logo">Ocean<span>AR</span></div>
    <div style="font-size:0.5rem; letter-spacing:0.18em; color:var(--teal);">✦ MARKERLESS MODE</div>
</div>

<model-viewer 
  id="oceanView"
  src="models/school_of_fish.glb" 
  ios-src="models/school_of_fish.usdz"
  ar ar-modes="webxr scene-viewer quick-look" 
  ar-placement="floor" 
  camera-controls auto-rotate shadow-intensity="1">
  
  <button slot="ar-button" id="ar-button">ENTER AR WORLD</button>

  <div id="creatureSelector">
    <button id="btn-fish" class="creature-btn active" onclick="switchCreature('fish')"><span>🐠</span>Fish</button>
    <button id="btn-shark" class="creature-btn" onclick="switchCreature('shark')"><span>🦈</span>Shark</button>
    <button class="creature-btn" onclick="toggleInfo()"><span>✦</span>Info</button>
  </div>
</model-viewer>

<div id="infoCard">
  <div class="card-wrap">
    <div class="card-name" id="cName">School of Fish</div>
    <div class="card-grid">
        <div class="stat"><label>Habitat</label><value id="cHab">Coral Reefs</value></div>
        <div class="stat"><label>Diet</label><value id="cDiet">Plankton</value></div>
    </div>
    <p id="cFact" style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.9rem; margin-bottom:1.2rem;"></p>
    <button onclick="toggleInfo()" style="width:100%; background:transparent; border:1px solid var(--teal); color:var(--teal); padding:10px; font-size:0.5rem; letter-spacing:0.2em;">DISMISS</button>
  </div>
</div>

<script>
  const DATA = {
    fish: { name: 'School of Fish', hab: 'Coral Reefs', diet: 'Plankton', fact: 'Fish school in tight formations to confuse predators.', glb: 'models/school_of_fish.glb', usdz: 'models/school_of_fish.usdz' },
    shark: { name: 'Swimming Shark', hab: 'Open Ocean', diet: 'Fish, Rays', fact: 'Sharks use electroreceptors to detect hidden prey.', glb: 'models/swimming_shark.glb', usdz: 'models/swimming_shark.usdz' }
  };

  // 1. FORCED LOADER REMOVAL (The Bug Fix)
  function hideLoader() {
    const loader = document.getElementById('loading');
    if (loader) {
        loader.classList.add('hidden-load');
        setTimeout(() => { loader.style.display = 'none'; }, 500);
    }
  }

  // Hide loader after a maximum of 1.5 seconds regardless of assets
  setTimeout(hideLoader, 1500);

  // 2. START EXPERIENCE
  const startBtn = document.getElementById('startBtn');
  const splash = document.getElementById('splash');

  const enterOcean = (e) => {
    e.preventDefault();
    splash.classList.add('splash-hide');
    setTimeout(() => { splash.style.display = 'none'; }, 600);
  };

  startBtn.addEventListener('click', enterOcean);
  startBtn.addEventListener('touchstart', enterOcean, {passive: false});

  // 3. UI GENERATION
  document.addEventListener('DOMContentLoaded', () => {
    makeBubbles();
  });

  function makeBubbles() {
    const el = document.getElementById('bubblesEl');
    for (let i = 0; i < 18; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const s = Math.random()*20+8;
      b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*8+4}s;animation-delay:${Math.random()*5}s;`;
      el.appendChild(b);
    }
  }

  function switchCreature(id) {
    const viewer = document.getElementById('oceanView');
    const d = DATA[id];
    viewer.src = d.glb;
    viewer.iosSrc = d.usdz;
    document.getElementById('cName').innerText = d.name;
    document.getElementById('cHab').innerText = d.hab;
    document.getElementById('cDiet').innerText = d.diet;
    document.getElementById('cFact').innerText = d.fact;
    document.querySelectorAll('.creature-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + id).classList.add('active');
  }

  function toggleInfo() {
    document.getElementById('infoCard').classList.toggle('visible');
  }
</script>
</body>
</html>
