<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>OceanAR — Markerless Experience</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --deep: #020c18;
      --teal: #1ab3c8;
      --foam: #a8f0f5;
      --glow: #00ffe7;
      --text: #d8f4f7;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family:'Space Mono',monospace; background:var(--deep); color:var(--text); overflow:hidden; height: 100vh; }

    /* ── SPLASH SCREEN ── */
    #splash, #loading {
      position:fixed; inset:0; z-index:1000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:radial-gradient(ellipse at 50% 70%, #0a3a5a 0%, #020c18 70%);
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    .hidden { opacity:0 !important; visibility: hidden !important; pointer-events:none !important; }

    .bubbles { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index: 1; }
    .bubble {
      position:absolute; bottom:-40px; border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(26,179,200,0.08));
      border:1px solid rgba(26,179,200,0.25);
      animation:rise linear infinite;
    }
    @keyframes rise { to { transform:translateY(-110vh); opacity:0; } }

    .title {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3.2rem, 11vw, 6rem); font-weight:300; line-height:0.95;
      color:var(--foam); text-shadow:0 0 50px rgba(0,255,231,0.25);
    }
    .title em { font-style:italic; color:var(--glow); }

    #startBtn {
      background:transparent; border:1.5px solid var(--glow); color:var(--glow);
      padding:1.2rem 2.5rem; cursor:pointer; text-transform:uppercase; 
      letter-spacing:0.2em; font-size: 0.8rem; margin-top: 3rem; z-index: 1001;
    }

    /* ── MODEL VIEWER ── */
    model-viewer {
      width: 100%; height: 100%;
      background-color: var(--deep);
      --poster-color: transparent;
    }

    /* ── HUD ── */
    .hud-top {
      position:absolute; top:0; left:0; right:0; padding:1.5rem;
      display:flex; justify-content:space-between; align-items:center;
      z-index: 100; pointer-events: none;
    }
    .hud-logo { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--foam); }
    .hud-logo span { color:var(--glow); font-style:italic; }

    #ar-button {
      position: absolute; bottom: 3rem; left: 50%; transform: translateX(-50%);
      background: #fff; color: #000; border: none;
      padding: 1rem 2rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; border-radius: 4px; cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* ── INFO CARD ── */
    #infoCard {
      position:fixed; bottom:-100%; left:50%; transform:translateX(-50%);
      width:min(420px,93vw); z-index:500; transition:bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #infoCard.visible { bottom: 1.5rem; }
    .card-wrap {
      background: rgba(10, 37, 64, 0.98);
      border: 1px solid var(--teal); padding: 1.8rem; border-radius: 8px;
      backdrop-filter: blur(15px);
    }
    .info-toggle {
        background: transparent; border: 1px solid var(--teal); color: var(--teal);
        padding: 5px 12px; font-size: 0.6rem; cursor: pointer; pointer-events: auto;
    }
  </style>
</head>
<body>

<div id="loading">
  <div style="font-size:2rem; animation: swim 2s infinite ease-in-out;">🐠</div>
  <p style="letter-spacing:0.4em; font-size:0.6rem; color:var(--teal); margin-top:1rem;">PREPARING ECOSYSTEM</p>
</div>

<div id="splash">
  <div class="bubbles" id="bubblesEl"></div>
  <div style="text-align:center; z-index:2;">
    <p style="font-size:0.6rem; letter-spacing:0.4em; color:var(--teal); text-transform:uppercase;">CPIS360</p>
    <h1 class="title">Ocean<em>AR</em></h1>
    <p style="font-family:'Cormorant Garamond',serif; font-style:italic; opacity:0.6; margin-top:0.5rem;">Markerless Deep Sea Experience</p>
    <button id="startBtn">Begin Experience</button>
  </div>
</div>

<div class="hud-top">
    <div class="hud-logo">Ocean<span>AR</span></div>
    <button class="info-toggle" onclick="toggleInfo()">✦ LEARN MORE</button>
</div>

<model-viewer 
  id="oceanView"
  src="models/school_of_fish.glb" 
  ios-src="models/school_of_fish.usdz"
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls 
  auto-rotate 
  shadow-intensity="1"
  exposure="1.2">
  
  <button slot="ar-button" id="ar-button">👋 VIEW IN YOUR ROOM</button>
</model-viewer>

<div id="infoCard">
  <div class="card-wrap">
    <h2 style="font-family:'Cormorant Garamond',serif; color:var(--foam); font-size:2rem;">School of Fish</h2>
    <p style="font-size:0.85rem; line-height:1.7; margin: 1.2rem 0; color:rgba(168,240,245,0.8); font-style: italic;">
        "Fish school in tight formations to confuse predators. By moving as one organism, they make it nearly impossible for hunters to focus on a single target."
    </p>
    <button onclick="toggleInfo()" style="width:100%; background:var(--teal); border:none; color:var(--deep); padding:12px; font-weight:bold; cursor:pointer; letter-spacing: 0.1em;">DISMISS</button>
  </div>
</div>

<script>
  const splash = document.getElementById('splash');
  const startBtn = document.getElementById('startBtn');

  // iOS Safari Tap Fix
  const startApp = (e) => {
    e.preventDefault();
    splash.classList.add('hidden');
    setTimeout(() => { splash.style.display = 'none'; }, 600);
  };

  startBtn.addEventListener('click', startApp);
  startBtn.addEventListener('touchstart', startApp, {passive: false});

  window.addEventListener('load', () => {
    makeBubbles();
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 600);
    }, 1000);
  });

  function makeBubbles() {
    const el = document.getElementById('bubblesEl');
    for (let i = 0; i < 20; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const s = Math.random()*20+8;
      b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*8+4}s;animation-delay:${Math.random()*5}s;`;
      el.appendChild(b);
    }
  }

  function toggleInfo() {
    document.getElementById('infoCard').classList.toggle('visible');
  }
</script>

</body>
</html>
