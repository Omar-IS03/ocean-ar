<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>OceanAR — Immersive Deep Sea</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');
    :root { --deep: #020c18; --teal: #1ab3c8; --foam: #a8f0f5; --glow: #00ffe7; --text: #d8f4f7; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Mono',monospace; background:var(--deep); color:var(--text); overflow:hidden; height: 100vh; }

    /* LOADER & SPLASH */
    #loading { position:fixed; inset:0; z-index:9999; background:var(--deep); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem; transition: 0.4s; }
    .hidden-load { opacity:0; pointer-events:none; }
    #splash { position:fixed; inset:0; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; background:radial-gradient(ellipse at 50% 70%, #0a3a5a 0%, #020c18 70%); transition: 0.5s; }
    .splash-hide { opacity:0; visibility: hidden; }
    .title { font-family:'Cormorant Garamond',serif; font-size:clamp(3.2rem, 11vw, 6rem); color:var(--foam); margin-bottom: 1.8rem;}
    #startBtn { border:1.5px solid var(--glow); color:var(--glow); background:transparent; padding:1rem 2.5rem; cursor:pointer; text-transform:uppercase; font-size:0.75rem; letter-spacing:0.2em; }

    /* UI ELEMENTS */
    .hud-top { position:absolute; top:0; left:0; right:0; padding:1.5rem; display:flex; justify-content:space-between; z-index: 100; pointer-events: none; }
    .hud-logo { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--foam); }
    #creatureSelector { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; gap:0.8rem; z-index:150; }
    .creature-btn { background:rgba(2,12,24,0.85); border:1px solid rgba(26,179,200,0.3); color:var(--foam); padding:0.6rem 1rem; border-radius: 4px; font-size:0.55rem; text-transform:uppercase; cursor:pointer; }
    .creature-btn.active { border-color:var(--glow); color:var(--glow); }

    /* AR BUTTON */
    #ar-button { position: absolute; bottom: 8rem; left: 50%; transform: translateX(-50%); background: var(--glow); color: var(--deep); border: none; padding: 1rem 2rem; font-weight: 700; border-radius: 4px; cursor: pointer; z-index:100; }
    model-viewer { width: 100%; height: 100%; }
  </style>
</head>
<body>

<audio id="sharkGrowl" loop preload="auto">
  <source src="Audio/SharkSound.mp3" type="audio/mpeg">
</audio>

<div id="loading">
  <div style="font-size:2rem;">🐠</div>
  <div style="font-size:0.6rem; color:var(--teal);">SYNCING NEURAL LINK...</div>
</div>

<div id="splash">
  <div class="splash-content">
    <h1 class="title">Ocean<em>AR</em></h1>
    <button id="startBtn">Begin Experience</button>
  </div>
</div>

<div class="hud-top">
    <div class="hud-logo">Ocean<span>AR</span></div>
</div>

<model-viewer 
  id="oceanView"
  ar 
  ar-modes="quick-look webxr scene-viewer" 
  ar-placement="floor" 
  camera-controls 
  shadow-intensity="1">
  <button slot="ar-button" id="ar-button">ENTER AR WORLD</button>
  <div id="creatureSelector">
    <button id="btn-fish" class="creature-btn" onclick="switchCreature('fish')"><span>🐠</span>Fish</button>
    <button id="btn-shark" class="creature-btn" onclick="switchCreature('shark')"><span>🦈</span>Shark</button>
  </div>
</model-viewer>

<script>
const DATA = {
    fish: { 
        glb: 'Models/School_of_fish.glb', 
        iosSrc: 'Models/School_of_fish.usdz' 
    },
    shark: { 
        glb: 'Models/Shark_animated.glb', 
        iosSrc: 'Animation/Shark_animated.reality' 
    }
};

let currentCreature = 'fish';
const viewer = document.getElementById('oceanView');
const audio = document.getElementById('sharkGrowl');

// 1. إخفاء شاشة التحميل
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden-load');
    }, 1000);
});

// 2. زر البداية
document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('splash').classList.add('splash-hide');
    switchCreature('fish');
});

// 3. تبديل الكائنات (بدون تشغيل الصوت في المتصفح)
function switchCreature(id) {
    currentCreature = id;
    viewer.src = DATA[id].glb;
    viewer.iosSrc = DATA[id].iosSrc;
    
    // نوقف أي صوت شغال عشان ما يزعجنا في المتصفح
    audio.pause();
    audio.currentTime = 0;

    document.querySelectorAll('.creature-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + id).classList.add('active');
}

// 4. الحل النهائي للصوت (يشتغل فقط داخل الكاميرا)
viewer.addEventListener('ar-status', (event) => {
    if (event.detail.status === 'session-started') {
        // إذا كنا داخل الـ AR والمختار هو القرش، شغل الصوت
        if (currentCreature === 'shark') {
            audio.play().catch(e => console.log("Audio play blocked"));
        }
    } else if (event.detail.status === 'not-presenting') {
        // بمجرد إغلاق الكاميرا، الصوت يوقف فوراً
        audio.pause();
        audio.currentTime = 0;
    }
});
</script>
</body>
</html>
