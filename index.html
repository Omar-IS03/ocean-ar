<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>OceanAR — Professional Edition</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');
    
    :root { 
      --deep: #020c18; 
      --teal: #1ab3c8; 
      --glow: #00ffe7; 
      --glass: rgba(2, 12, 24, 0.7);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Mono', monospace; background:var(--deep); overflow:hidden; height: 100vh; color: white; }

    /* Loading Screen */
    #loading { 
      position:fixed; inset:0; z-index:9999; background:var(--deep); 
      display:flex; justify-content:center; align-items:center; transition: 0.6s; 
    }
    .hidden-load { opacity:0 !important; pointer-events:none !important; }

    /* Splash Screen */
    #splash { 
      position:fixed; inset:0; z-index:1000; display:flex; flex-direction:column; 
      align-items:center; justify-content:center; 
      background: radial-gradient(circle at center, #0a3a5a 0%, #020c18 100%); 
      transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .splash-hide { opacity:0 !important; transform: scale(1.1); visibility: hidden !important; }

    .title { font-family:'Cormorant Garamond', serif; font-size:clamp(3.5rem, 12vw, 7rem); color:var(--glow); letter-spacing: -2px; margin-bottom: 2rem;}
    
    #startBtn { 
      border: 1px solid var(--glow); color: var(--glow); background: transparent; 
      padding: 1.2rem 3rem; cursor: pointer; text-transform: uppercase; 
      letter-spacing: 4px; transition: 0.3s; box-shadow: 0 0 15px rgba(0, 255, 231, 0.2);
    }
    #startBtn:hover { background: var(--glow); color: var(--deep); box-shadow: 0 0 30px var(--glow); }

    /* UI Controls */
    #creatureSelector { 
      position:fixed; bottom: 3rem; left:50%; transform:translateX(-50%); 
      display:flex; gap:1.5rem; z-index:150; 
    }
    
    .creature-btn { 
      background: var(--glass); border: 1px solid rgba(0, 255, 231, 0.3); 
      color: white; padding: 0.8rem 1.5rem; border-radius: 50px; 
      font-size: 0.7rem; text-transform: uppercase; cursor: pointer; 
      backdrop-filter: blur(10px); transition: 0.3s;
    }
    .creature-btn.active { border-color: var(--glow); background: var(--glow); color: var(--deep); font-weight: bold; }

    /* ENTER AR Button */
    #manual-ar-link {
      position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
      background: rgba(0, 255, 231, 0.9); color: var(--deep); 
      padding: 1rem 2rem; font-weight: 800; border-radius: 50px; 
      text-decoration: none; font-size: 0.8rem; letter-spacing: 2px;
      z-index: 1000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
      100% { transform: translateX(-50%) scale(1); }
    }

    model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
  </style>
</head>
<body>

<audio id="sharkAudio" loop preload="auto">
  <source src="Audio/SharkSound.mp3" type="audio/mpeg">
</audio>

<div id="loading"> <div style="font-size:2rem; animation: float 2s infinite">🐢</div> </div>

<div id="splash">
  <div class="splash-content" style="text-align: center;">
    <h1 class="title">Ocean<em>AR</em></h1>
    <button id="startBtn">Discover Abyss</button>
  </div>
</div>

<a id="manual-ar-link" rel="ar" href="https://omar-is03.github.io/ocean-ar/Animation/turtle_animated.reality">
  🚀 Launch AR Experience
</a>

<model-viewer 
  id="oceanView"
  src="https://omar-is03.github.io/ocean-ar/Models/turtle_animated.glb"
  ar
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls 
  shadow-intensity="1"
  exposure="1.2"
  autoplay>
  
  <div id="creatureSelector">
    <button id="btn-turtle" class="creature-btn active" onclick="switchCreature('turtle')">🐢 Sea Turtle</button>
    <button id="btn-shark" class="creature-btn" onclick="switchCreature('shark')">🦈 Great White</button>
  </div>
</model-viewer>

<script>
// تحديث الداتا لتشمل السلحفاة بدلاً من السمكة
const DATA = {
    turtle: { 
        glb: 'https://omar-is03.github.io/ocean-ar/Models/turtle_animated.glb', 
        ios: 'https://omar-is03.github.io/ocean-ar/Animation/turtle_animated.reality' 
    },
    shark: { 
        glb: 'https://omar-is03.github.io/ocean-ar/Models/shark_animated.glb', 
        ios: 'https://omar-is03.github.io/ocean-ar/Animation/shark_animated.reality' 
    }
};

const viewer = document.getElementById('oceanView');
const arLink = document.getElementById('manual-ar-link');
const audio = document.getElementById('sharkAudio');
let currentID = 'turtle'; // البداية بالسلحفاة

window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('loading').classList.add('hidden-load'), 1000);
});

document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('splash').classList.add('splash-hide');
    arLink.style.display = 'inline-block';
});

function switchCreature(id) {
    currentID = id;
    viewer.src = DATA[id].glb;
    arLink.href = DATA[id].ios;
    
    // إيقاف الصوت عند التبديل
    audio.pause();
    audio.currentTime = 0;
    
    document.querySelectorAll('.creature-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + id).classList.add('active');
}

// تشجيع المتصفح على تفعيل الصوت (فقط للقرش)
arLink.addEventListener('click', () => {
    if(currentID === 'shark') {
        audio.muted = true;
        audio.play().then(() => {
            console.log("Audio Unlocked for AR");
        });
    }
});

// تشغيل الصوت عند الدخول للـ AR للقرش
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        if (currentID === 'shark') {
            audio.muted = false;
            audio.play();
        }
    } else {
        audio.pause();
        audio.currentTime = 0;
    }
});
</script>
</body>
</html>
